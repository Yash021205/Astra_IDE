# Local development stack for ASTRA-IDE.
# All four services + PostgreSQL + Redis + MinIO in one `docker compose up`.
#
# Hostnames inside the network:
#   backend         FastAPI    :8000
#   frontend        Next.js    :3000
#   collab          y-websocket :1234
#   postgres        Postgres   :5432
#   redis           Redis      :6379
#   minio           MinIO      :9000  (console :9001)

services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     astra
      POSTGRES_PASSWORD: astra_dev
      POSTGRES_DB:       astra
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  minio:
    restart: unless-stopped
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     admin
      MINIO_ROOT_PASSWORD: admin12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 10

  backend:
    restart: unless-stopped
    build:
      context: ../backend
      dockerfile: Dockerfile
    # Optionally loads carbon token + other secrets from backend/.env (gitignored).
    # `required: false` lets a fresh clone run with no .env present — those
    # features fall back gracefully (carbon uses a historical average, Google
    # OAuth stays disabled). Values in `environment:` below take precedence.
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL:    postgresql+psycopg2://astra:astra_dev@postgres:5432/astra
      REDIS_URL:       redis://redis:6379/0
      JWT_SECRET:      dev-secret-change-me-in-production
      COLLAB_WS_URL:   ws://collab:1234
      MINIO_ENDPOINT:  http://minio:9000
      CORS_ORIGINS:    '["http://localhost:3000", "http://${PUBLIC_HOST:-localhost}:3000"]'
      # Real per-workspace containers (Start → docker run; terminal → docker exec).
      ENABLE_REAL_CONTAINERS: "${ENABLE_REAL_CONTAINERS:-1}"
      ASTRA_WORKSPACE_DATA:   /app/workspace_data
      WORKSPACE_DATA_HOST:    ${WORKSPACE_DATA_HOST:-/opt/astra/workspace_data}
    ports: ["8000:8000"]
    volumes:
      # Manage real containers + share the workspace files with them (the host
      # path must match WORKSPACE_DATA_HOST so nested bind-mounts resolve).
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_DATA_HOST:-/opt/astra/workspace_data}:/app/workspace_data
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_healthy }

  collab:
    restart: unless-stopped
    build:
      context: ../collab-server
      dockerfile: Dockerfile
    ports: ["1234:1234"]

  frontend:
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: Dockerfile
      # Next.js bakes rewrites + NEXT_PUBLIC_* into the production build, so
      # we MUST pass these as build-args (not just runtime env vars).
      # Set PUBLIC_HOST to the public IP/domain that users hit in their browser:
      #   PUBLIC_HOST=34.14.181.224 docker compose up -d --build frontend
      args:
        BACKEND_URL:                http://backend:8000
        NEXT_PUBLIC_COLLAB_WS_URL:  ws://${PUBLIC_HOST:-localhost}:1234
        # Production `next start` does not proxy WebSocket upgrades, so the
        # terminal connects straight to the backend's public port.
        NEXT_PUBLIC_BACKEND_WS_URL: ws://${PUBLIC_HOST:-localhost}:8000
    environment:
      # Same values also set at runtime so server-side rewrites can read them.
      BACKEND_URL:                http://backend:8000
      NEXT_PUBLIC_COLLAB_WS_URL:  ws://${PUBLIC_HOST:-localhost}:1234
      NEXT_PUBLIC_BACKEND_WS_URL: ws://${PUBLIC_HOST:-localhost}:8000
    ports: ["3000:3000"]
    depends_on:
      - backend
      - collab

volumes:
  postgres_data:
  minio_data:
