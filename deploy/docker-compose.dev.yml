# Minimal dev compose — only the data-plane services (Postgres + Redis + MinIO + collab).
# Run backend and frontend natively on your host with hot-reload.
#
# Usage:
#   docker compose -f deploy/docker-compose.dev.yml up -d
#   (then run backend + frontend manually with `uvicorn` and `npm run dev`)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     astra
      POSTGRES_PASSWORD: astra_dev
      POSTGRES_DB:       astra
    ports: ["5432:5432"]
    volumes:
      - dev_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     admin
      MINIO_ROOT_PASSWORD: admin12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dev_minio:/data

  collab:
    build:
      context: ../collab-server
      dockerfile: Dockerfile
    ports: ["1234:1234"]

volumes:
  dev_pg:
  dev_minio:
