name: Build & push images

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER:    ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend, collab-server]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          # GHCR/Docker registries require lowercase repository names
          OWNER_LC=$(echo "${{ env.OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=${{ env.REGISTRY }}/${OWNER_LC}/astra-ide-${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "sha=$SHA_SHORT" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push:    true
          tags: |
            ${{ steps.meta.outputs.tag }}:latest
            ${{ steps.meta.outputs.tag }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
