name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import-check backend modules
        run: python -c "import app.main; import app.api.auth; import app.api.workspaces; import app.api.carbon"
      - name: Verify schema generation
        run: python -c "from app.db.session import Base, engine; from app.models import User, Workspace; Base.metadata.create_all(bind=engine)"
      - name: Run backend unit tests
        run: python -m unittest discover -s tests -v

  # ── ML packages (risk scorer + scheduler + prewarming) ────────────────────
  ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pandas
      - name: Risk scorer tests
        run: python -m unittest ml.risk_scorer.test_scorer -v
      - name: Scheduler env tests
        run: python -m unittest ml.scheduler.test_env -v
      - name: Prewarming dataset tests
        run: python -m unittest ml.prewarming.test_dataset -v

  # ── Frontend (Next.js + TypeScript) ───────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL:   http://localhost:8000
          NEXT_PUBLIC_COLLAB_WS_URL: ws://localhost:1234

  # ── Collab server (y-websocket) ───────────────────────────────────────────
  collab:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: collab-server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: collab-server/package-lock.json
      - run: npm ci
      - name: Boot smoke test
        run: |
          node server.js &
          PID=$!
          sleep 2
          curl -fsS http://localhost:1234/healthz
          kill $PID
