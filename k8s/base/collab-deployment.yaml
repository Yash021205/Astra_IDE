apiVersion: apps/v1
kind: Deployment
metadata:
  name: collab
  namespace: astra-ide
  labels:
    app: astra-collab
    component: collab
spec:
  # Keep single-replica until sharded room routing is wired up
  replicas: 1
  selector:
    matchLabels:
      app: astra-collab
  template:
    metadata:
      labels:
        app: astra-collab
        component: collab
    spec:
      containers:
      - name: collab
        image: ghcr.io/prasannamishra001/astra-ide-collab:latest
        ports: [{ containerPort: 1234 }]
        env:
        - name: MAX_PAYLOAD_KB
          value: "512"
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "500m", memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 1234 }
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collab
  namespace: astra-ide
spec:
  selector: { app: astra-collab }
  ports: [{ port: 1234, targetPort: 1234, name: ws }]
