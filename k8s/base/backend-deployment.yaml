apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: astra-ide
  labels:
    app: astra-backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: astra-backend
  template:
    metadata:
      labels:
        app: astra-backend
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/prasannamishra001/astra-ide-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: astra-secrets, key: database-url } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: astra-secrets, key: jwt-secret } }
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: COLLAB_WS_URL
          value: "ws://collab:1234"
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 8000 }
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8000 }
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: astra-ide
spec:
  selector: { app: astra-backend }
  ports:
  - port: 8000
    targetPort: 8000
    name: http
