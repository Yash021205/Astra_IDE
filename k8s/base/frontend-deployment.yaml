apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: astra-ide
  labels:
    app: astra-frontend
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: astra-frontend
  template:
    metadata:
      labels:
        app: astra-frontend
        component: web
    spec:
      containers:
      - name: web
        image: ghcr.io/prasannamishra001/astra-ide-frontend:latest
        ports: [{ containerPort: 3000 }]
        env:
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "http://backend.astra-ide.svc.cluster.local:8000"
        - name: NEXT_PUBLIC_COLLAB_WS_URL
          value: "ws://collab.astra-ide.svc.cluster.local:1234"
        resources:
          requests: { cpu: "100m", memory: "256Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: astra-ide
spec:
  selector: { app: astra-frontend }
  ports: [{ port: 3000, targetPort: 3000, name: http }]
